<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="../index.html" class="logo">JAMB <span>MAX</span></a>
                <button class="sidebar-close" id="sidebarClose">×</button>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <span class="nav-icon">🏠</span>
                    <span>Dashboard</span>
                </a>
                <a href="study.html" class="nav-item active">
                    <span class="nav-icon">📚</span>
                    <span>Study Room</span>
                </a>
                <a href="exam.html" class="nav-item">
                    <span class="nav-icon">📝</span>
                    <span>Mock Exam</span>
                </a>
                <a href="past-questions.html" class="nav-item">
                    <span class="nav-icon">📋</span>
                    <span>Past Questions</span>
                </a>
                <a href="ai.html" class="nav-item">
                    <span class="nav-icon">🤖</span>
                    <span>AI Tutor</span>
                </a>
                <a href="flashcards.html" class="nav-item">
                    <span class="nav-icon">🎴</span>
                    <span>Flashcards</span>
                </a>
                <a href="progress.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span>Progress</span>
                </a>
                <a href="leaderboard.html" class="nav-item">
                    <span class="nav-icon">🏆</span>
                    <span>Leaderboard</span>
                </a>
                <a href="profile.html" class="nav-item">
                    <span class="nav-icon">👤</span>
                    <span>Profile</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-mini" id="userMini">
                    <div class="user-avatar" id="userAvatar">?</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">Guest</div>
                        <div class="user-level" id="userLevel">Level 1</div>
                    </div>
                </div>
                <button class="btn btn-outline btn-full" id="logoutBtn" style="display: none;">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <div class="top-bar-right">
                    <div class="xp-badge" id="xpBadge">⭐ 0 XP</div>
                    <div class="streak-badge" id="streakBadge">🔥 0</div>
                    <div class="connection-status" id="connectionStatus">● Offline</div>
                </div>
            </header>

            <div class="page-content" id="pageContent">
                <div class="page active" id="study-page">
                    <div class="page-header">
                        <h1>Study Room</h1>
                        <p>Practice by subject, topic, or year</p>
                    </div>
                    
                    <div class="study-filters">
                        <div class="filter-group">
                            <label>Subject</label>
                            <select id="studySubject" class="form-select">
                                <option value="">All Subjects</option>
                                <option value="english">English Language</option>
                                <option value="mathematics">Mathematics</option>
                                <option value="physics">Physics</option>
                                <option value="chemistry">Chemistry</option>
                                <option value="biology">Biology</option>
                                <option value="government">Government</option>
                                <option value="economics">Economics</option>
                                <option value="literature">Literature</option>
                                <option value="crs">CRS</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Topic</label>
                            <select id="studyTopic" class="form-select">
                                <option value="">All Topics</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Year</label>
                            <select id="studyYear" class="form-select">
                                <option value="">All Years</option>
                                <option value="2024">2024</option>
                                <option value="2023">2023</option>
                                <option value="2022">2022</option>
                                <option value="2021">2021</option>
                                <option value="2020">2020</option>
                                <option value="2019">2019</option>
                                <option value="2018">2018</option>
                                <option value="2017">2017</option>
                                <option value="2016">2016</option>
                                <option value="2015">2015</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Number</label>
                            <select id="studyCount" class="form-select">
                                <option value="5">5 Questions</option>
                                <option value="10" selected>10 Questions</option>
                                <option value="20">20 Questions</option>
                                <option value="40">40 Questions</option>
                            </select>
                        </div>
                    </div>
                    
                    <button class="btn btn-primary" onclick="study.startPractice()" style="margin-bottom: 2rem;">
                        Start Practice
                    </button>
                    
                    <div id="studyContainer" style="display: none;">
                        <div class="progress-bar">
                            <div class="progress-fill" id="studyProgress"></div>
                        </div>
                        <div class="question-container" id="studyQuestion"></div>
                        <div class="study-controls">
                            <button class="btn btn-outline" id="studyPrev" onclick="study.prev()">Previous</button>
                            <button class="btn btn-primary" id="studyNext" onclick="study.next()">Next</button>
                            <button class="btn btn-success" id="studySubmit" onclick="study.submit()" style="display: none;">Submit</button>
                        </div>
                    </div>
                    
                    <div id="studyResults" style="display: none;">
                        <div class="results-card">
                            <h2>Practice Complete! 🎉</h2>
                            <div class="score-circle" id="studyScoreCircle">
                                <span id="studyScore">0%</span>
                            </div>
                            <div id="studyBreakdown"></div>
                            <button class="btn btn-primary" onclick="study.restart()">Practice Again</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../data/english.js"></script>
    <script src="../data/mathematics.js"></script>
    <script src="../data/physics.js"></script>
    <script src="../data/chemistry.js"></script>
    <script src="../data/biology.js"></script>
    <script src="../data/government.js"></script>
    <script src="../data/economics.js"></script>
    <script src="../data/literature.js"></script>
    <script src="../data/crs.js"></script>
    <script src="../js/data-loader.js"></script>
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/study.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
