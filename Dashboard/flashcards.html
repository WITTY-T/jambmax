<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards — JAMB MAX</title>
    <meta name="theme-color" content="#0a192f">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="../index.html" class="logo">JAMB <span>MAX</span></a>
                <button class="sidebar-close" id="sidebarClose">×</button>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <span class="nav-icon">🏠</span>
                    <span>Dashboard</span>
                </a>
                <a href="study.html" class="nav-item">
                    <span class="nav-icon">📚</span>
                    <span>Study Room</span>
                </a>
                <a href="exam.html" class="nav-item">
                    <span class="nav-icon">📝</span>
                    <span>Mock Exam</span>
                </a>
                <a href="past-questions.html" class="nav-item">
                    <span class="nav-icon">📋</span>
                    <span>Past Questions</span>
                </a>
                <a href="ai.html" class="nav-item">
                    <span class="nav-icon">🤖</span>
                    <span>AI Tutor</span>
                </a>
                <a href="flashcards.html" class="nav-item active">
                    <span class="nav-icon">🎴</span>
                    <span>Flashcards</span>
                </a>
                <a href="progress.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span>Progress</span>
                </a>
                <a href="leaderboard.html" class="nav-item">
                    <span class="nav-icon">🏆</span>
                    <span>Leaderboard</span>
                </a>
                <a href="profile.html" class="nav-item">
                    <span class="nav-icon">👤</span>
                    <span>Profile</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-mini" id="userMini">
                    <div class="user-avatar" id="userAvatar">?</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">Guest</div>
                        <div class="user-level" id="userLevel">Level 1</div>
                    </div>
                </div>
                <button class="btn btn-outline btn-full" id="logoutBtn" style="display: none;">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <div class="top-bar-right">
                    <div class="xp-badge" id="xpBadge">⭐ 0 XP</div>
                    <div class="streak-badge" id="streakBadge">🔥 0</div>
                    <div class="connection-status" id="connectionStatus">● Offline</div>
                </div>
            </header>

            <div class="page-content" id="pageContent">
                <div class="page active" id="flashcards-page">
                    <div class="page-header">
                        <h1>Flashcards</h1>
                        <p>Spaced repetition for better retention</p>
                    </div>
                    <div class="card">
                        <div id="flashcardContainer">
                            <div class="empty-state" style="padding: 3rem;">
                                <div style="font-size: 3rem; margin-bottom: 1rem;">🎴</div>
                                <h3>Smart Flashcards</h3>
                                <p>Generate cards from your weak areas or add custom cards.</p>
                                <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem;">
                                    <button class="btn btn-primary" onclick="flashcards.generateFromWeakAreas()">
                                        Generate from Weak Areas
                                    </button>
                                    <button class="btn btn-outline" onclick="flashcards.render()">
                                        Study Now
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script type="module" src="../js/firebase-config.js"></script>
    <script defer src="../js/db.js"></script>
    <script defer src="../js/auth.js"></script>
    <script defer src="../js/flashcards.js"></script>
    <script defer src="../js/app.js"></script>
</body>
</html>
